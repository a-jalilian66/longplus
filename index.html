<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقف فعالیت سایت</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
            border-top: 5px solid #e74c3c;
            animation: fadeIn 1s ease-in-out;
        }

        .icon {
            font-size: 60px;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            line-height: 1.8;
            margin: 0;
            font-weight: 700;
        }

        p {
            margin-top: 20px;
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.6;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">⚠️</div>
    <h1>به دلیل وجود مشکلات متعدد برای ارائه خدمات، مجبور ‌به توقف فعالیت سایت شدیم</h1>
    <p>از همراهی شما در طول این مدت سپاسگزاریم.</p>

    <div class="footer">
        تمامی حقوق محفوظ است
    </div>
</div>

</body>
</html>
